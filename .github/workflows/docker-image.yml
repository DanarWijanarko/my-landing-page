name: Build and Push Docker Image

on:
  push:
    branches:
      - main # Change to master or your default branch

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # 1. Set up QEMU for emulation (Required for ARMv8 support)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Extract metadata
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      # 5. Build and Push with multi-platform support
      - name: Build and push Docker image
        uses: docker/build-push-action@v6  # Upgraded to v6 for better performance
        with:
          context: .
          push: true
          # linux/amd64 = standard Intel/AMD servers
          # linux/arm64 = ARMv8 (AWS Graviton, Apple M-chips, Raspberry Pi)
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
